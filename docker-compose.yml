services :

#-----------------
# MinIO - server d'object storage (même language Amazon S3)
#-----------------
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" #pour l'API
      - "9001:9001" #pour la console web
    volumes:
      - minio_data:/data

#-----------------
# MinIO - minio client pour initialiser le server minio
#-----------------
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/judge-avatars;
      mc anonymous set download local/judge-avatars;
      exit 0;"

#-----------------
# DB - Postgresql
#-----------------
  db:
    image: postgres:16
    container_name: judge-db
    environment:
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: judge_dev_pwd
      POSTGRES_DB: judge
    ports:
      - "5432:5432"
    volumes:
      - judge_pgdata:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d 

volumes:
  judge_pgdata:
  minio_data: